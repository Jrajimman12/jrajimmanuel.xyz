<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jraj Immanuel</title>

    <!-- Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #0f172a, #020617);
            color: white;
            text-align: center;
        }

        section {
            padding: 60px 20px;
        }

        h1 {
            font-size: 45px;
            margin-bottom: 10px;
            animation: fadeIn 1s ease-in;
        }

        p {
            color: #94a3b8;
        }

        .buttons a {
            text-decoration: none;
            color: white;
            margin: 10px;
            padding: 12px 22px;
            border: 1px solid #38bdf8;
            border-radius: 30px;
            display: inline-block;
            transition: 0.3s;
        }

        .buttons a:hover {
            background: #38bdf8;
            color: black;
            transform: scale(1.1);
        }

        ul {
            list-style: none;
            padding: 0;
        }

        li {
            display: inline-block;
            margin: 10px;
            padding: 12px 18px;
            background: #1e293b;
            border-radius: 20px;
            transition: 0.3s;
        }

        li:hover {
            transform: scale(1.1);
            background: #38bdf8;
            color: black;
        }

        .project-card {
            background: #1e293b;
            margin: 20px auto;
            padding: 20px;
            border-radius: 15px;
            width: 80%;
            transition: 0.3s;
        }

        .project-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        @keyframes fadeIn {
            from {opacity: 0;}
            to {opacity: 1;}
        }
    </style>
</head>

<body>

    <section id="hero">
        <h1>Jraj Immanuel</h1>
        <p>B.Tech IT Student | Developer</p>

        <div class="buttons">
            <a href="#"><i class="fa-solid fa-file"></i> Resume</a>
            <a href="#"><i class="fa-brands fa-github"></i> GitHub</a>
            <a href="#"><i class="fa-brands fa-instagram"></i> Instagram</a>
            <a href="#"><i class="fa-brands fa-linkedin"></i> LinkedIn</a>
        </div>
    </section>

    <section id="skills">
        <h2>My Skills</h2>
        <ul>
            <li>Python</li>
            <li>C#</li>
            <li>HTML</li>
            <li>AI / ML</li>
        </ul>
    </section>

    <section id="projects">
        <h2>My Projects</h2>

        <div class="project-card">
            <h3>InfoVerify</h3>
            <p>AI-based system to verify news authenticity</p>
        </div>

        <div class="project-card">
            <h3>Church Connect</h3>
            <p>Manage membership and donations with ease.</p>
        </div>

    </section>

</body>
</html>
